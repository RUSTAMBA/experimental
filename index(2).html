<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Поиск номеров самокатов — склад</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<canvas id="scooterCanvas" aria-hidden="true"></canvas>

<style>
* { box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --card: #020617;
  --text: #e5e7eb;
  --muted: rgba(229,231,235,.65);
  --border: rgba(229,231,235,.12);
  --y-yellow: #FFD500;
  --y-black: #0b0f1a;
  --ok: #22c55e;
  --bad: #ef4444;
  --surface: rgba(255,255,255,.03);
  --surface-hover: rgba(255,255,255,.06);
}

body {
  margin: 0;
  padding: 16px 16px 100px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes pulse {
  0%, 100% { opacity: .6; }
  50% { opacity: 1; }
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); max-height: 0; }
  to   { opacity: 1; transform: translateY(0); max-height: 500px; }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(.95); }
  to   { opacity: 1; transform: scale(1); }
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

h1 {
  margin: 10px 0 24px;
  text-align: center;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.3px;
  animation: fadeUp .35s ease both;
}

h1::after {
  content: "";
  display: block;
  width: 72px;
  height: 4px;
  border-radius: 999px;
  background: var(--y-yellow);
  margin: 10px auto 0;
  box-shadow: 0 8px 24px rgba(255,213,0,.18);
}

/* Loading bar */
.loading-bar {
  display: none;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--y-yellow), transparent);
  background-size: 200% 100%;
  animation: shimmer 1.2s ease infinite;
  border-radius: 999px;
  margin-bottom: 16px;
}
.loading-bar.active { display: block; }

/* Data status */
.data-status {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
  animation: fadeIn .3s ease;
}
.data-status.loading { color: var(--y-yellow); animation: pulse 1.2s ease infinite; }
.data-status.error { color: var(--bad); }
.data-status.ready { color: var(--ok); }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: 0 18px 38px rgba(0,0,0,.35);
  animation: fadeUp .35s ease both;
  transition: transform .12s ease, box-shadow .12s ease, border-color .2s ease;
}

.card:hover {
  border-color: rgba(255,213,0,.12);
}

.card:active {
  transform: scale(.992);
  box-shadow: 0 14px 30px rgba(0,0,0,.30);
  border-color: rgba(255,213,0,.22);
}

.card:nth-child(2) { animation-delay: .05s; }
.card:nth-child(3) { animation-delay: .1s; }
.card:nth-child(4) { animation-delay: .15s; }

h3 {
  margin: 0 0 10px;
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
}

input, select, button {
  width: 100%;
  display: block;
  font-size: 16px;
  border-radius: 12px;
}

input, select {
  padding: 14px 14px;
  margin-top: 8px;
  border: 1px solid rgba(229,231,235,.14);
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: box-shadow .15s ease, border-color .15s ease, transform .08s ease, background .15s ease;
}

input::placeholder { color: rgba(229,231,235,.40); }

input:focus, select:focus {
  border-color: rgba(255,213,0,.55);
  box-shadow: 0 0 0 4px rgba(255,213,0,.14);
  background: rgba(255,255,255,.05);
}

input:active, select:active { transform: scale(.998); }

/* Search input wrapper */
.search-input-wrap {
  position: relative;
  margin-top: 8px;
}

.search-input-wrap input {
  margin-top: 0;
  padding-right: 44px;
}

.clear-btn {
  display: none;
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 30px !important;
  height: 30px;
  padding: 0 !important;
  margin: 0 !important;
  border-radius: 50% !important;
  background: rgba(255,255,255,.08) !important;
  color: var(--text) !important;
  font-size: 16px !important;
  line-height: 30px;
  text-align: center;
  cursor: pointer;
  border: none !important;
  transition: background .15s ease;
}
.clear-btn:hover { background: rgba(255,255,255,.14) !important; }
.clear-btn.visible { display: block; }

button {
  margin-top: 10px;
  padding: 14px 14px;
  border: none;
  background: var(--y-yellow);
  color: var(--y-black);
  font-weight: 900;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform .12s ease, filter .12s ease, box-shadow .2s ease;
}

button:hover {
  filter: brightness(.98);
  box-shadow: 0 4px 16px rgba(255,213,0,.25);
}

button:active {
  transform: translateY(1px) scale(.99);
}

button.searching {
  pointer-events: none;
  opacity: .8;
}

/* Ripple effect */
button::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  width: 12px;
  height: 12px;
  border-radius: 999px;
  background: rgba(17,17,17,.18);
  transform: translate(-50%,-50%) scale(0);
  opacity: 0;
  pointer-events: none;
}

button:active::after {
  opacity: 1;
  transform: translate(-50%,-50%) scale(18);
  transition: transform .35s ease, opacity .6s ease;
}

.result {
  margin-top: 12px;
  font-size: 16px;
  line-height: 1.45;
  animation: fadeUp .2s ease both;
}

.ok { color: var(--ok); font-weight: 800; }
.bad { color: var(--bad); font-weight: 800; }

/* Result item animations */
.result-item {
  padding: 10px 12px;
  margin: 6px 0;
  border-radius: 10px;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  animation: scaleIn .2s ease both;
  transition: background .15s ease, border-color .15s ease, transform .1s ease;
  cursor: default;
}

.result-item:hover {
  background: rgba(255,255,255,.06);
  border-color: rgba(255,213,0,.18);
  transform: translateX(3px);
}

.result-item.ok-item {
  border-left: 3px solid var(--ok);
}

.result-item.bad-item {
  border-left: 3px solid var(--bad);
}

/* Highlight match */
.match-highlight {
  background: rgba(255,213,0,.15);
  color: var(--y-yellow);
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 700;
}

/* Copy button */
.copy-btn {
  display: inline-block;
  width: auto !important;
  padding: 4px 10px !important;
  margin: 0 0 0 8px !important;
  font-size: 12px !important;
  border-radius: 6px !important;
  background: rgba(255,255,255,.08) !important;
  color: var(--text) !important;
  border: 1px solid rgba(255,255,255,.1) !important;
  vertical-align: middle;
  cursor: pointer;
  transition: all .15s ease;
}

.copy-btn:hover {
  background: rgba(255,213,0,.15) !important;
  color: var(--y-yellow) !important;
  border-color: rgba(255,213,0,.3) !important;
}

.copy-btn.copied {
  background: rgba(34,197,94,.15) !important;
  color: var(--ok) !important;
  border-color: rgba(34,197,94,.3) !important;
}

/* Live search results */
.live-results {
  margin-top: 8px;
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}

.live-results.active {
  max-height: 300px;
  overflow-y: auto;
}

.live-result-item {
  padding: 10px 12px;
  margin: 4px 0;
  border-radius: 8px;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  font-size: 14px;
  cursor: pointer;
  animation: fadeIn .15s ease both;
  transition: background .12s ease, transform .1s ease;
}

.live-result-item:hover {
  background: rgba(255,213,0,.08);
  transform: translateX(4px);
}

.live-result-count {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
  padding: 0 4px;
}

/* Empty state message */
.empty-msg {
  text-align: center;
  padding: 16px;
  color: var(--muted);
  font-size: 14px;
}

/* Error shake animation */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

.shake { animation: shake .4s ease; }

/* Success glow */
@keyframes glowPulse {
  0% { box-shadow: 0 0 0 0 rgba(34,197,94,.3); }
  70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
  100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}

.glow-ok { animation: glowPulse .6s ease; }

.list {
  margin-top: 10px;
  font-size: 14px;
  line-height: 1.55;
  word-break: break-word;
  color: var(--text);
}

/* Room result grid */
.room-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.room-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  border-radius: 8px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  font-size: 14px;
  font-weight: 600;
  animation: scaleIn .2s ease both;
  transition: background .15s ease, border-color .15s ease, transform .1s ease;
  cursor: default;
}

.room-tag:hover {
  background: rgba(255,213,0,.08);
  border-color: rgba(255,213,0,.2);
  transform: scale(1.03);
}

/* Recent searches */
.recent-wrap {
  margin-top: 10px;
}

.recent-label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.recent-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.recent-tag {
  display: inline-block;
  width: auto !important;
  padding: 5px 12px !important;
  margin: 0 !important;
  font-size: 13px !important;
  border-radius: 8px !important;
  background: rgba(255,255,255,.05) !important;
  color: var(--text) !important;
  border: 1px solid rgba(255,255,255,.08) !important;
  cursor: pointer;
  transition: all .15s ease;
  font-weight: 600;
}

.recent-tag:hover {
  background: rgba(255,213,0,.1) !important;
  border-color: rgba(255,213,0,.25) !important;
  color: var(--y-yellow) !important;
}

/* Count badge */
.count-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(255,213,0,.12);
  color: var(--y-yellow);
  font-size: 12px;
  font-weight: 700;
  margin-left: 6px;
}

/* Center on desktop */
@media (min-width: 640px) {
  body { max-width: 520px; margin: 0 auto; padding: 24px 24px 100px; }
  .card { padding: 22px; }
  h1 { font-size: 26px; margin-bottom: 28px; }
}

/* Mobile sticky search */
@media (max-width: 639px) {
  .search-card {
    position: sticky;
    top: 0;
    z-index: 10;
    margin-left: -16px;
    margin-right: -16px;
    margin-top: -16px;
    border-radius: 0 0 16px 16px;
    padding-top: 12px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(2,6,23,.92);
  }
  h1 { font-size: 18px; margin: 6px 0 14px; }
}

/* Respect reduced motion */
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

html, body { overflow-x: hidden; }

/* ===== Canvas scooter background ===== */
#scooterCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

body > *:not(#scooterCanvas) {
  position: relative;
  z-index: 1;
}

/* Subtle gradient overlay at bottom */
body::before {
  content: "";
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 40%;
  background: linear-gradient(to top, rgba(10,10,10,.9), transparent);
  pointer-events: none;
  z-index: 0;
}

@media (prefers-reduced-motion: reduce) {
  #scooterCanvas { display: none; }
}
</style>

<h1>🛴 Поиск номеров самокатов</h1>

<div id="dataStatus" class="data-status loading">⏳ Загрузка данных...</div>
<div id="loadingBar" class="loading-bar active"></div>

<div class="card search-card">
  <h3>🔎 Поиск номера</h3>
  <div class="search-input-wrap">
    <input id="numberInput" placeholder="Введите номер самоката" autocomplete="off" inputmode="text">
    <button class="clear-btn" id="clearBtn" title="Очистить">✕</button>
  </div>
  <div id="liveResults" class="live-results"></div>
  <button id="searchBtn" onclick="findByNumber()">Найти</button>
  <div id="numberResult" class="result"></div>
  <div id="recentSearches" class="recent-wrap" style="display:none;">
    <div class="recent-label">🕐 Недавние поиски</div>
    <div id="recentTags" class="recent-tags"></div>
  </div>
</div>

<div class="card">
  <h3>🏠 Поиск по комнате</h3>
  <select id="roomSelect"></select>
  <button onclick="findByRoom()">Показать</button>
  <div id="roomResult" class="list"></div>
</div>

<div id="notFoundMedia" style="display:none; text-align:center; margin-top:20px;">
  <video id="failVideo" width="100%" controls>
    <source src="fail.mp4" type="video/mp4">
  </video>
</div>

<script>
// ===== Dynamic Scooter Background Animation =====
(function() {
  'use strict';

  // Respect reduced motion
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const canvas = document.getElementById('scooterCanvas');
  const ctx = canvas.getContext('2d');

  let W, H, dpr;
  let mouseX = 0, mouseY = 0;
  let scrollSpeed = 1;
  let scooters = [];
  const MAX_SCOOTERS = 14;
  const INITIAL_COUNT = 7;

  // Pre-render scooter SVG to offscreen canvas for performance
  const scooterImg = new Image();
  const svgStr = `<svg xmlns='http://www.w3.org/2000/svg' width='220' height='140' viewBox='0 0 220 140'>
    <defs>
      <filter id='glow'><feGaussianBlur stdDeviation='2' result='blur'/><feMerge><feMergeNode in='blur'/><feMergeNode in='SourceGraphic'/></feMerge></filter>
    </defs>
    <g filter='url(%23glow)'>
      <circle cx='55' cy='112' r='16' fill='%23cbd5e1' fill-opacity='.35'/>
      <circle cx='165' cy='112' r='16' fill='%23cbd5e1' fill-opacity='.35'/>
      <circle cx='55' cy='112' r='10' fill='%23334155' fill-opacity='.5'/>
      <circle cx='165' cy='112' r='10' fill='%23334155' fill-opacity='.5'/>
      <rect x='68' y='97' width='82' height='9' rx='5' fill='%23cbd5e1' fill-opacity='.28'/>
      <rect x='140' y='52' width='9' height='55' rx='5' fill='%23cbd5e1' fill-opacity='.28'/>
      <rect x='140' y='45' width='40' height='9' rx='5' fill='%23cbd5e1' fill-opacity='.28'/>
      <circle cx='105' cy='38' r='12' fill='%23cbd5e1' fill-opacity='.30'/>
      <rect x='92' y='50' width='28' height='30' rx='12' fill='%23cbd5e1' fill-opacity='.28'/>
      <rect x='103' y='78' width='10' height='30' rx='6' fill='%23cbd5e1' fill-opacity='.28'/>
      <rect x='88' y='66' width='16' height='9' rx='5' fill='%23cbd5e1' fill-opacity='.28'/>
      <rect x='112' y='66' width='20' height='9' rx='5' fill='%23cbd5e1' fill-opacity='.28'/>
      <rect x='78' y='95' width='22' height='5' rx='3' fill='%23FFD500' fill-opacity='.45'/>
      <circle cx='55' cy='112' r='16' fill='none' stroke='%23FFD500' stroke-opacity='.08' stroke-width='2'/>
      <circle cx='165' cy='112' r='16' fill='none' stroke='%23FFD500' stroke-opacity='.08' stroke-width='2'/>
    </g>
  </svg>`;
  scooterImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // Scooter factory
  function createScooter(opts) {
    const depth = opts && opts.depth != null ? opts.depth : 0.3 + Math.random() * 0.7;
    const goingRight = opts && opts.dir != null ? opts.dir : Math.random() > 0.5;
    const speed = (0.4 + depth * 1.2 + Math.random() * 0.5) * (goingRight ? 1 : -1);
    const scale = 0.3 + depth * 0.55;
    const y = opts && opts.y != null ? opts.y : Math.random() * H;
    const x = opts && opts.x != null ? opts.x : (goingRight ? -140 * scale : W + 140 * scale);

    return {
      x: x,
      y: y,
      speed: speed,
      scale: scale,
      depth: depth,
      opacity: 0.06 + depth * 0.14,
      bobPhase: Math.random() * Math.PI * 2,
      bobSpeed: 1.2 + Math.random() * 1.0,
      bobAmp: 2 + depth * 4,
      parallaxFactor: depth * 0.6,
      fadeIn: 0,
      isNew: !!(opts && opts.isNew)
    };
  }

  function initScooters() {
    scooters = [];
    for (let i = 0; i < INITIAL_COUNT; i++) {
      const s = createScooter({
        y: (H * (i + 0.5)) / INITIAL_COUNT + (Math.random() - 0.5) * (H / INITIAL_COUNT * 0.6),
        depth: 0.2 + (i / INITIAL_COUNT) * 0.6 + Math.random() * 0.2,
        x: Math.random() * W
      });
      s.fadeIn = 1;
      scooters.push(s);
    }
    // Sort by depth for proper layering
    scooters.sort(function(a, b) { return a.depth - b.depth; });
  }

  // Draw a single scooter
  function drawScooter(s, dt) {
    // Update position
    var effectiveSpeed = s.speed * scrollSpeed;
    s.x += effectiveSpeed * dt * 60;

    // Bob up/down
    s.bobPhase += s.bobSpeed * dt;
    var bobY = Math.sin(s.bobPhase) * s.bobAmp;

    // Parallax offset based on mouse
    var px = (mouseX - W / 2) * s.parallaxFactor * 0.03;
    var py = (mouseY - H / 2) * s.parallaxFactor * 0.02;

    // Fade in new scooters
    if (s.fadeIn < 1) {
      s.fadeIn = Math.min(1, s.fadeIn + dt * 1.5);
    }

    var drawX = s.x + px;
    var drawY = s.y + bobY + py;
    var drawW = 110 * s.scale;
    var drawH = 70 * s.scale;

    ctx.save();
    ctx.globalAlpha = s.opacity * s.fadeIn;

    // Motion blur effect via slight horizontal stretch
    var blurStretch = Math.abs(effectiveSpeed) * 0.02;
    ctx.translate(drawX, drawY);

    // Flip if going left
    if (s.speed < 0) {
      ctx.scale(-1 - blurStretch, 1);
    } else {
      ctx.scale(1 + blurStretch, 1);
    }

    // Shadow under scooter
    ctx.shadowColor = 'rgba(255, 213, 0, 0.12)';
    ctx.shadowBlur = 12 * s.scale;
    ctx.shadowOffsetY = 8 * s.scale;

    // Draw scooter image
    ctx.drawImage(scooterImg, -drawW / 2, -drawH / 2, drawW, drawH);

    // Subtle glow
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = s.opacity * s.fadeIn * 0.3;
    ctx.shadowColor = 'rgba(255, 213, 0, 0.2)';
    ctx.shadowBlur = 20 * s.scale;
    ctx.shadowOffsetY = 0;
    ctx.drawImage(scooterImg, -drawW / 2, -drawH / 2, drawW, drawH);

    ctx.restore();

    // Check if out of bounds and reset
    var margin = 160 * s.scale;
    if (s.speed > 0 && s.x > W + margin) {
      s.x = -margin;
      s.y = Math.random() * H;
      s.fadeIn = 0;
    } else if (s.speed < 0 && s.x < -margin) {
      s.x = W + margin;
      s.y = Math.random() * H;
      s.fadeIn = 0;
    }
  }

  // Ground shadow (ellipse under each scooter)
  function drawGroundShadow(s) {
    if (s.fadeIn < 0.3) return;
    var bobY = Math.sin(s.bobPhase) * s.bobAmp;
    var px = (mouseX - W / 2) * s.parallaxFactor * 0.03;
    var py = (mouseY - H / 2) * s.parallaxFactor * 0.02;
    var drawX = s.x + px;
    var drawY = s.y + py + 35 * s.scale;

    ctx.save();
    ctx.globalAlpha = s.opacity * s.fadeIn * 0.25;
    ctx.beginPath();
    ctx.ellipse(drawX, drawY + bobY * 0.3, 30 * s.scale, 6 * s.scale, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 213, 0, 0.15)';
    ctx.fill();
    ctx.restore();
  }

  // Ambient particles (tiny dots floating for atmosphere)
  var particles = [];
  function initParticles() {
    for (var i = 0; i < 30; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 0.5 + Math.random() * 1.5,
        speed: 0.1 + Math.random() * 0.3,
        opacity: 0.05 + Math.random() * 0.1,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function drawParticles(dt) {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.speed * dt * 60 * scrollSpeed;
      p.phase += dt * 0.5;
      p.y += Math.sin(p.phase) * 0.2;

      if (p.x > W + 10) { p.x = -10; p.y = Math.random() * H; }

      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = '#FFD500';
      ctx.fill();
      ctx.restore();
    }
  }

  // Animation loop
  var lastTime = 0;
  function animate(now) {
    if (!lastTime) lastTime = now;
    var dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;

    ctx.clearRect(0, 0, W, H);

    // Draw ambient particles
    drawParticles(dt);

    // Draw ground shadows first (behind scooters)
    for (var i = 0; i < scooters.length; i++) {
      drawGroundShadow(scooters[i]);
    }

    // Draw scooters sorted by depth
    for (var j = 0; j < scooters.length; j++) {
      drawScooter(scooters[j], dt);
    }

    // Gradually ease scroll speed back to 1
    if (scrollSpeed > 1) {
      scrollSpeed = Math.max(1, scrollSpeed - dt * 0.4);
    }

    requestAnimationFrame(animate);
  }

  // ===== Interactivity =====

  // Mouse parallax
  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  // Touch parallax for mobile
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 0) {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }
  }, { passive: true });

  // Click to spawn scooter
  document.addEventListener('click', function(e) {
    // Only spawn if click is on the background area (not on interactive elements)
    if (e.target.closest('input, button, select, .card, a, .live-result-item, .recent-tag, .room-tag, video')) return;

    if (scooters.length < MAX_SCOOTERS) {
      var s = createScooter({
        x: e.clientX,
        y: e.clientY,
        depth: 0.4 + Math.random() * 0.5,
        isNew: true
      });
      scooters.push(s);
      scooters.sort(function(a, b) { return a.depth - b.depth; });
    }
  });

  // Scroll boosts speed
  var scrollTimeout;
  window.addEventListener('scroll', function() {
    scrollSpeed = Math.min(2.5, scrollSpeed + 0.15);
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(function() {
      // scrollSpeed eases back in animate loop
    }, 200);
  }, { passive: true });

  // Handle resize
  var resizeTimeout;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(function() {
      resize();
    }, 150);
  });

  // Init
  function init() {
    resize();
    initScooters();
    initParticles();
    requestAnimationFrame(animate);
  }

  if (scooterImg.complete) {
    init();
  } else {
    scooterImg.onload = init;
  }
})();
</script>

<script>
  const SHEET_URL = "https://script.google.com/macros/s/AKfycbzy7zzE7R8OUea8JOVKc4wekVhe0Q1gydNOiZiJpKtEK71bC3UFearJzjgtOYVCZQIhrA/exec";

  let data = {};
  let dataLoaded = false;

  // Recent searches (stored in localStorage)
  function getRecent() {
    try {
      return JSON.parse(localStorage.getItem('recentSearches') || '[]');
    } catch { return []; }
  }

  function saveRecent(query) {
    if (!query) return;
    let recent = getRecent();
    recent = recent.filter(r => r !== query);
    recent.unshift(query);
    if (recent.length > 5) recent = recent.slice(0, 5);
    localStorage.setItem('recentSearches', JSON.stringify(recent));
    renderRecent();
  }

  function renderRecent() {
    const recent = getRecent();
    const wrap = document.getElementById('recentSearches');
    const tags = document.getElementById('recentTags');
    if (!recent.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    tags.innerHTML = recent.map(r =>
      `<button class="recent-tag" onclick="useRecent('${r.replace(/'/g, "\\'")}')">${r}</button>`
    ).join('');
  }

  function useRecent(val) {
    const input = document.getElementById('numberInput');
    input.value = val;
    input.dispatchEvent(new Event('input'));
    findByNumber();
  }

  // Copy to clipboard
  function copyNumber(num) {
    navigator.clipboard.writeText(num).then(() => {
      const btn = document.querySelector(`[data-copy="${num}"]`);
      if (btn) {
        btn.textContent = '✓ Скопировано';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '📋 Копировать'; btn.classList.remove('copied'); }, 1500);
      }
    });
  }

  // Data loading
  async function loadData() {
    const status = document.getElementById('dataStatus');
    const bar = document.getElementById('loadingBar');
    try {
      const res = await fetch(SHEET_URL);
      const json = await res.json();

      data = {};

      json.forEach(row => {
        const number = String(row.number).trim();
        const room = String(row.room).trim();

        if (!data[number]) {
          data[number] = [];
        }

        data[number].push(room);
      });

      dataLoaded = true;
      updateRooms();

      const count = Object.keys(data).length;
      status.textContent = `✅ Загружено ${count} самокатов`;
      status.className = 'data-status ready';
      bar.classList.remove('active');

      setTimeout(() => { status.style.display = 'none'; }, 2500);
    } catch (e) {
      status.textContent = '❌ Ошибка загрузки данных. Обновите страницу.';
      status.className = 'data-status error';
      bar.classList.remove('active');
    }
  }

  function updateRooms() {
    const select = document.getElementById("roomSelect");

    const rooms = [
      ...new Set(
        Object.values(data).flat()
      )
    ].sort();

    select.innerHTML = "";

    rooms.forEach(r => {
      const opt = document.createElement("option");
      opt.value = r;
      opt.textContent = r;
      select.appendChild(opt);
    });
  }

  // Live search
  let liveTimeout;
  document.getElementById('numberInput').addEventListener('input', function() {
    const val = this.value.trim();
    const clearBtn = document.getElementById('clearBtn');

    // Toggle clear button
    clearBtn.classList.toggle('visible', val.length > 0);

    // Live search
    clearTimeout(liveTimeout);
    if (val.length >= 1 && dataLoaded) {
      liveTimeout = setTimeout(() => showLiveResults(val), 120);
    } else {
      hideLiveResults();
    }
  });

  // Enter key
  document.getElementById('numberInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') findByNumber();
  });

  // Clear button
  document.getElementById('clearBtn').addEventListener('click', function() {
    const input = document.getElementById('numberInput');
    input.value = '';
    input.focus();
    this.classList.remove('visible');
    hideLiveResults();
    document.getElementById('numberResult').innerHTML = '';
    document.getElementById('notFoundMedia').style.display = 'none';
  });

  function showLiveResults(query) {
    const container = document.getElementById('liveResults');
    const matches = Object.keys(data).filter(n =>
      n.toLowerCase().includes(query.toLowerCase())
    ).slice(0, 8);

    if (!matches.length) {
      container.innerHTML = '<div class="empty-msg">Нет совпадений</div>';
      container.classList.add('active');
      return;
    }

    container.innerHTML = `<div class="live-result-count">Найдено: ${matches.length}${Object.keys(data).filter(n => n.toLowerCase().includes(query.toLowerCase())).length > 8 ? '+' : ''}</div>` +
      matches.map((n, i) => {
        const highlighted = n.replace(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<span class="match-highlight">$1</span>');
        const rooms = data[n].join(', ');
        return `<div class="live-result-item" style="animation-delay:${i * 30}ms" onclick="selectLiveResult('${n.replace(/'/g, "\\'")}')">${highlighted} <span style="color:var(--muted);font-size:12px">→ ${rooms}</span></div>`;
      }).join('');

    container.classList.add('active');
  }

  function hideLiveResults() {
    const container = document.getElementById('liveResults');
    container.classList.remove('active');
    setTimeout(() => { container.innerHTML = ''; }, 200);
  }

  function selectLiveResult(num) {
    document.getElementById('numberInput').value = num;
    hideLiveResults();
    findByNumber();
  }

  function findByNumber() {
    const input = document.getElementById("numberInput");
    const num = input.value.trim();
    const res = document.getElementById("numberResult");
    const btn = document.getElementById("searchBtn");

    hideLiveResults();

    // Validate empty input
    if (!num) {
      res.innerHTML = '<div class="result-item bad-item">⚠️ Введите номер самоката</div>';
      res.className = 'result';
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 400);
      input.focus();
      return;
    }

    // Show searching state
    btn.classList.add('searching');
    btn.textContent = '⏳ Поиск...';

    setTimeout(() => {
      if (data[num]) {
        const rooms = data[num];
        res.innerHTML = `<div class="result-item ok-item glow-ok">
          ✅ Самокат <span class="match-highlight">${num}</span>
          <button class="copy-btn" data-copy="${num}" onclick="event.stopPropagation();copyNumber('${num}')">📋 Копировать</button>
          <br>${rooms.map(r => `📍 ${r}`).join('<br>')}
        </div>`;
        res.className = "result";
        document.getElementById("notFoundMedia").style.display = "none";
        saveRecent(num);
      } else {
        res.innerHTML = `<div class="result-item bad-item">
          ❌ Номер <b>${num}</b> не найден
        </div>`;
        res.className = "result";

        const videoBlock = document.getElementById("notFoundMedia");
        const video = document.getElementById("failVideo");

        videoBlock.style.display = "block";
        video.currentTime = 0;
        video.volume = 1;
        video.play();

        saveRecent(num);
      }

      btn.classList.remove('searching');
      btn.textContent = 'Найти';
    }, 150);
  }

  function findByRoom() {
    const room = document.getElementById("roomSelect").value;

    const entries = Object.entries(data)
      .filter(([_, rooms]) => rooms.includes(room));

    const res = document.getElementById("roomResult");

    if (entries.length) {
      res.innerHTML = `<div style="margin-bottom:6px;font-weight:700;">📦 Самокаты в комнате <span class="count-badge">${entries.length}</span></div>
        <div class="room-grid">${entries.map(([n], i) =>
          `<span class="room-tag" style="animation-delay:${i * 30}ms">${n}
            <button class="copy-btn" data-copy="${n}" onclick="event.stopPropagation();copyNumber('${n}')" style="margin:0!important;padding:2px 6px!important;font-size:11px!important">📋</button>
          </span>`
        ).join('')}</div>`;
    } else {
      res.innerHTML = '<div class="result-item bad-item">❌ В этой комнате ничего нет</div>';
    }
  }

  // Init
  loadData();
  renderRecent();
</script>
</body>
</html>
